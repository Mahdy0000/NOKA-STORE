kind = "web"
previewPath = "/"
title = "NŌKA Store"
version = "1.0.0"
id = "artifacts/noka-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24490

[services.development]
run = "pnpm --filter @workspace/noka-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/noka-store", "run", "build" ]
publicDir = "artifacts/noka-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24490"
BASE_PATH = "/"
